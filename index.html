<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手势识别魔法画板</title>
    <!-- GitHub Pages 基础路径配置 -->
    <base href="./">
    <!-- SEO 优化 -->
    <meta name="description" content="基于 MediaPipe 的手势识别魔法画板，支持离线运行和实时手势交互">
    <meta name="keywords" content="mediapipe, hand-tracking, canvas, gesture-recognition, offline">
    <!-- PWA 支持 -->
    <meta name="theme-color" content="#0f172a">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    
    <!-- Tailwind CSS (离线版 - CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 自定义样式 -->
    <style>
        /* 视频镜像效果 */
        .mirrored {
            transform: scaleX(-1);
        }
        
        /* 确保视频容器始终可见 */
        #video-container {
            display: block !important;
            z-index: 100 !important;
            position: relative !important;
        }
        
        /* 视频元素样式 - 隐藏但保持渲染 */
        #input-video {
            opacity: 0;
            position: absolute;
            width: 1px;
            height: 1px;
            pointer-events: none;
            top: 0;
            left: 0;
        }
    </style>
    
    <!-- MediaPipe Hands 库 -->
    <script src="./mediapipe/hands.js"></script>
</head>
<body>
    <!-- 隐藏的视频元素（用于 MediaPipe 处理） -->
    <video id="input-video" autoplay playsinline muted></video>

    <!-- 画布容器 -->
    <div class="absolute inset-0 z-10 pointer-events-none">
        <canvas id="main-canvas" class="w-full h-full"></canvas>
    </div>

    <!-- UI 层 -->
    <div class="absolute inset-0 z-20 flex flex-col justify-between p-6 pointer-events-none">
        
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
                    手势识别魔法画板（离线版）
                </h1>
                <p class="mt-2 text-slate-300 max-w-md">
                    允许浏览器访问摄像头。将手对准镜头：<br/>
                    ✨ 移动食指进行绘制。<br/>
                    💥 捏合（拇指+食指）触发能量爆发。
                </p>
                <div id="ai-magic-info" class="mt-4 p-3 bg-indigo-900/40 border border-indigo-500/30 rounded-lg hidden backdrop-blur-sm transition-all max-w-md">
                    <h3 id="magic-name" class="text-lg font-bold text-indigo-300 flex items-center gap-2">
                        <span>✨</span> <span id="magic-name-text"></span>
                    </h3>
                    <p id="magic-lore" class="text-sm text-indigo-200/80 mt-1 italic leading-relaxed"></p>
                </div>
            </div>
            
            <div id="status-panel" class="bg-slate-800/80 backdrop-blur border border-slate-700 p-4 rounded-xl shadow-lg flex items-center space-x-4">
                <div id="status-indicator" class="w-3 h-3 rounded-full bg-yellow-400 animate-pulse"></div>
                <span id="status-text" class="text-sm font-medium">正在加载 AI 模型...</span>
            </div>
        </div>

        <div class="flex justify-between items-end pointer-events-auto">
            <div class="flex space-x-3 bg-slate-800/80 backdrop-blur p-2 rounded-xl border border-slate-700">
                <button id="toggle-video" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">隐藏摄像头预览</button>
                <button id="toggle-skeleton" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-sm transition-colors">隐藏骨骼</button>
                <button id="clear-canvas" class="px-4 py-2 bg-red-500/20 text-red-400 hover:bg-red-500/40 rounded-lg text-sm transition-colors">清空画板</button>
                <button id="summon-magic" class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white rounded-lg text-sm font-bold shadow-lg transition-all flex items-center gap-1">
                    ✨ 召唤新魔法（离线随机）
                </button>
                <button id="debug-camera" class="px-4 py-2 bg-yellow-600/20 text-yellow-400 hover:bg-yellow-600/40 rounded-lg text-sm transition-colors border border-yellow-600/30">🔧 调试摄像头</button>
            </div>
            
            <div id="video-container" class="w-48 rounded-xl overflow-hidden border-2 border-slate-600 shadow-xl" style="position: relative; z-index: 50;">
                <canvas id="video-preview" style="display: block; width: 100%; height: auto; background: #000;"></canvas>
            </div>
        </div>
    </div>

    <!-- 错误遮罩 -->
    <div id="error-screen" class="hidden absolute inset-0 z-50 bg-slate-900 flex flex-col items-center justify-center p-6 text-center">
        <svg class="w-16 h-16 text-red-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <h2 class="text-2xl font-bold mb-2">无法访问摄像头</h2>
        <p class="text-slate-400 max-w-lg">
            手势识别需要摄像头权限。请在浏览器提示中点击"允许"，或检查设备设置。
            <br/><br/>
            注意：请通过 http://localhost 访问，不要直接双击打开文件。
        </p>
        <button onclick="window.location.reload()" class="mt-6 px-6 py-2 bg-cyan-600 hover:bg-cyan-500 rounded-full font-medium transition-colors">
            刷新重试
        </button>
    </div>

    <!-- 调试面板（临时添加） -->
    <div id="debug-panel" class="absolute top-20 right-6 z-30 bg-slate-800/90 backdrop-blur border border-slate-600 p-4 rounded-xl shadow-lg hidden pointer-events-auto max-w-sm">
        <h3 class="text-lg font-bold text-cyan-400 mb-3">🔧 摄像头调试工具</h3>
        <div class="space-y-2 text-sm">
            <div class="flex justify-between">
                <span class="text-slate-300">协议:</span>
                <span id="debug-protocol" class="font-mono text-yellow-400"></span>
            </div>
            <div class="flex justify-between">
                <span class="text-slate-300">MediaDevices API:</span>
                <span id="debug-api" class="font-mono"></span>
            </div>
            <div class="flex justify-between">
                <span class="text-slate-300">视频设备数量:</span>
                <span id="debug-devices" class="font-mono text-cyan-400"></span>
            </div>
        </div>
        <div class="mt-4 space-y-2">
            <button id="test-camera-btn" class="w-full px-4 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-sm font-medium transition-colors">
                📸 测试摄像头
            </button>
            <button id="list-devices-btn" class="w-full px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-sm font-medium transition-colors">
                📋 列出所有设备
            </button>
            <button id="close-debug-btn" class="w-full px-4 py-2 bg-slate-600 hover:bg-slate-500 rounded-lg text-sm transition-colors">
                关闭
            </button>
        </div>
        <div id="debug-output" class="mt-3 p-2 bg-slate-900/50 rounded text-xs font-mono text-slate-300 max-h-40 overflow-y-auto whitespace-pre-wrap"></div>
    </div>

    <!-- 调试开关按钮 -->
    <button id="toggle-debug" class="absolute top-6 right-6 z-30 px-3 py-1 bg-purple-600/80 hover:bg-purple-500 rounded-lg text-xs font-medium transition-colors pointer-events-auto">
        🔧 调试模式
    </button>

    <script>
        // --- DOM 元素 ---
        const videoElement = document.getElementById('input-video');
        const canvasElement = document.getElementById('main-canvas');
        const canvasCtx = canvasElement.getContext('2d', { alpha: false });
        
        console.log('🎯 初始化检查:');
        console.log('  videoElement:', videoElement ? '✅ 已获取' : '❌ 未找到');
        console.log('  canvasElement:', canvasElement ? '✅ 已获取' : '❌ 未找到');
        console.log('  canvasCtx:', canvasCtx ? '✅ 已获取' : '❌ 未找到');
        
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.getElementById('status-indicator');
        const errorScreen = document.getElementById('error-screen');

        // --- 状态 ---
        let showVideo = true;  // 默认显示摄像头
        let showSkeleton = true;
        let isModelLoaded = false;

        document.getElementById('toggle-video').addEventListener('click', (e) => {
            showVideo = !showVideo;
            const container = document.getElementById('video-container');
            if (container) {
                if (showVideo) {
                    container.classList.remove('hidden');
                } else {
                    container.classList.add('hidden');
                }
            }
            e.target.textContent = showVideo ? '隐藏摄像头预览' : '显示摄像头预览';
        });

        document.getElementById('toggle-skeleton').addEventListener('click', (e) => {
            showSkeleton = !showSkeleton;
            e.target.textContent = showSkeleton ? '隐藏骨骼' : '显示骨骼';
        });

        // --- 调试功能 ---
        const debugPanel = document.getElementById('debug-panel');
        const toggleDebugBtn = document.getElementById('toggle-debug');
        const debugOutput = document.getElementById('debug-output');
        
        function log(message) {
            console.log(message);
            debugOutput.textContent += message + '\n';
            debugOutput.scrollTop = debugOutput.scrollHeight;
        }

        toggleDebugBtn.addEventListener('click', () => {
            debugPanel.classList.toggle('hidden');
            if (!debugPanel.classList.contains('hidden')) {
                // 更新调试信息
                document.getElementById('debug-protocol').textContent = window.location.protocol;
                document.getElementById('debug-api').textContent = navigator.mediaDevices ? '✅ 支持' : '❌ 不支持';
                
                // 获取视频设备数量
                if (navigator.mediaDevices && navigator.mediaDevices.enumerateDevices) {
                    navigator.mediaDevices.enumerateDevices()
                        .then(devices => {
                            const videoDevices = devices.filter(d => d.kind === 'videoinput');
                            document.getElementById('debug-devices').textContent = videoDevices.length;
                            log(`📹 发现 ${videoDevices.length} 个视频设备`);
                            videoDevices.forEach((device, idx) => {
                                log(`   ${idx + 1}. ${device.label || `摄像头 ${idx + 1}`} (${device.deviceId.substring(0, 8)}...)`);
                            });
                        })
                        .catch(err => {
                            document.getElementById('debug-devices').textContent = '无法获取';
                            log(`❌ 枚举设备失败: ${err.message}`);
                        });
                }
            }
        });

        document.getElementById('close-debug-btn').addEventListener('click', () => {
            debugPanel.classList.add('hidden');
        });

        document.getElementById('test-camera-btn').addEventListener('click', async () => {
            log('\n🧪 开始测试摄像头...');
            
            try {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('浏览器不支持 getUserMedia API');
                }
                
                log('✓ API 检查通过');
                log('📸 请求摄像头权限...');
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                log('✅ 权限已授予！');
                log(`📊 视频流轨道数: ${stream.getVideoTracks().length}`);
                
                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                log(`📐 分辨率: ${settings.width}x${settings.height}`);
                log(`🎬 帧率: ${settings.frameRate || '未知'}`);
                log(`📷 设备: ${track.label || '未知'}`);
                
                // 停止测试流
                stream.getTracks().forEach(t => t.stop());
                log('✓ 测试完成，摄像头工作正常！');
                
                alert('✅ 摄像头测试成功！\n\n如果页面仍无法使用，请刷新页面并允许摄像头权限。');
                
            } catch (err) {
                log(`❌ 错误类型: ${err.name}`);
                log(`❌ 错误信息: ${err.message}`);
                
                let suggestion = '';
                if (err.name === 'NotAllowedError') {
                    suggestion = '💡 建议：点击地址栏左侧的 🔒 图标，将摄像头权限改为"允许"';
                } else if (err.name === 'NotFoundError') {
                    suggestion = '💡 建议：检查系统设置中摄像头是否启用';
                } else if (err.name === 'NotReadableError') {
                    suggestion = '💡 建议：关闭其他使用摄像头的程序（Zoom、微信等）';
                }
                
                if (suggestion) {
                    log(suggestion);
                    alert(`❌ 摄像头测试失败\n\n${err.name}: ${err.message}\n\n${suggestion}`);
                } else {
                    alert(`❌ 摄像头测试失败\n\n${err.name}: ${err.message}`);
                }
            }
        });

        document.getElementById('list-devices-btn').addEventListener('click', async () => {
            log('\n📋 扫描所有媒体设备...');
            
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                log(`总计发现 ${devices.length} 个设备:\n`);
                
                devices.forEach((device, idx) => {
                    const icon = device.kind === 'videoinput' ? '📹' : 
                                 device.kind === 'audioinput' ? '🎤' : '🔊';
                    log(`${icon} ${idx + 1}. ${device.kind}`);
                    log(`   标签: ${device.label || '(需要权限才能显示)'}`);
                    log(`   ID: ${device.deviceId.substring(0, 16)}...`);
                    log(`   Group: ${device.groupId.substring(0, 16)}...`);
                });
                
            } catch (err) {
                log(`❌ 扫描失败: ${err.message}`);
            }
        });

        // --- 画布尺寸 ---
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
            canvasCtx.fillStyle = '#0f172a';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 魔法颜色 ---
        let currentMagic = {
            normalH: 180,
            normalRange: 40,
            pinchH: 0,
            pinchRange: 30
        };

        const offlineMagicThemes = [
            { name: "冰霜凤凰", lore: "远古冰晶凝结成羽，每一次振翅都洒落极光碎屑。", normalH: 200, pinchH: 260 },
            { name: "暗影荆棘", lore: "夜色中生长的诅咒藤蔓，触碰之处留下幽紫印记。", normalH: 280, pinchH: 320 },
            { name: "琥珀流光", lore: "凝固千万年的松脂，释放出温暖的橙黄能量。", normalH: 40, pinchH: 60 },
            { name: "雷霆之心", lore: "暴风眼中的纯净闪电，以蓝白之姿撕裂虚空。", normalH: 210, pinchH: 30 },
            { name: "翡翠梦境", lore: "森林的低语凝聚成翠绿光点，滋养万物生机。", normalH: 120, pinchH: 150 },
            { name: "猩红炼狱", lore: "地心熔岩的吐息，带来毁灭与重生的炽热。", normalH: 10, pinchH: 350 }
        ];

        function randomMagic() {
            const idx = Math.floor(Math.random() * offlineMagicThemes.length);
            const theme = offlineMagicThemes[idx];
            return { themeName: theme.name, lore: theme.lore, normalH: theme.normalH, pinchH: theme.pinchH };
        }

        // --- 粒子系统 ---
        let particles = [];
        class Particle {
            constructor(x, y, isPinching) {
                this.x = x;
                this.y = y;
                const speedMult = isPinching ? 15 : 4;
                this.vx = (Math.random() - 0.5) * speedMult;
                this.vy = (Math.random() - 0.5) * speedMult;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
                if (isPinching) {
                    const h = currentMagic.pinchH + (Math.random() * currentMagic.pinchRange - currentMagic.pinchRange/2);
                    this.color = `hsl(${h}, 100%, 60%)`; 
                    this.size = Math.random() * 6 + 3;
                } else {
                    const h = currentMagic.normalH + (Math.random() * currentMagic.normalRange - currentMagic.normalRange/2);
                    this.color = `hsl(${h}, 100%, 60%)`; 
                    this.size = Math.random() * 4 + 1;
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        document.getElementById('clear-canvas').addEventListener('click', () => {
            particles = [];
            canvasCtx.fillStyle = '#0f172a';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
        });

        // --- 摄像头调试功能 ---
        const debugBtn = document.getElementById('debug-camera');
        let debugWindow = null;

        debugBtn.addEventListener('click', async () => {
            console.log('\n=== 🔧 开始摄像头诊断 ===\n');
            
            if (debugWindow && !debugWindow.closed) {
                debugWindow.focus();
                return;
            }
            
            debugWindow = window.open('', 'CameraDebug', 'width=600,height=800,scrollbars=yes');
            
            const writeLog = (msg, type = 'info') => {
                const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
                debugWindow.document.write(`<div style="color: ${color}; font-family: monospace; margin: 5px 0;">${msg}</div>`);
                console.log(msg);
            };
            
            writeLog('<h2>🔧 摄像头诊断报告</h2>', 'info');
            writeLog(`<p><strong>时间:</strong> ${new Date().toLocaleString()}</p>`);
            writeLog(`<p><strong>URL:</strong> ${window.location.href}</p>`);
            writeLog(`<p><strong>协议:</strong> ${window.location.protocol}</p>`);
            writeLog('<hr/>');
            
            if (!navigator.mediaDevices) {
                writeLog('❌ navigator.mediaDevices 不存在', 'error');
                writeLog('💡 您的浏览器不支持现代媒体设备 API，请升级到最新版 Chrome/Edge/Firefox', 'error');
                return;
            }
            writeLog('✅ navigator.mediaDevices 可用', 'success');
            
            if (!navigator.mediaDevices.getUserMedia) {
                writeLog('❌ getUserMedia 方法不存在', 'error');
                return;
            }
            writeLog('✅ getUserMedia 方法可用', 'success');
            
            try {
                if (navigator.permissions) {
                    const permission = await navigator.permissions.query({ name: 'camera' });
                    writeLog(`📋 摄像头权限状态: <strong>${permission.state}</strong>`);
                    if (permission.state === 'denied') {
                        writeLog('❌ 权限已被拒绝', 'error');
                        writeLog('💡 请点击地址栏左侧的 🔒 图标 → 摄像头 → 改为"允许"', 'error');
                    } else if (permission.state === 'granted') {
                        writeLog('✅ 权限已授予', 'success');
                    } else {
                        writeLog('⚠️ 权限状态为 prompt（需要用户确认）', 'info');
                    }
                } else {
                    writeLog('⚠️ 浏览器不支持 Permissions API，无法检测权限状态');
                }
            } catch (e) {
                writeLog(`⚠️ 权限检查失败: ${e.message}`);
            }
            
            writeLog('<h3>3️⃣ 可用摄像头设备</h3>');
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const videoDevices = devices.filter(d => d.kind === 'videoinput');
                
                if (videoDevices.length === 0) {
                    writeLog('❌ 未检测到任何摄像头设备', 'error');
                    writeLog('💡 请检查：1.摄像头是否正确连接 2.系统设置中是否启用摄像头 3.驱动是否正常', 'error');
                } else {
                    writeLog(`✅ 检测到 ${videoDevices.length} 个摄像头设备`, 'success');
                    videoDevices.forEach((device, index) => {
                        writeLog(`   📷 设备 ${index + 1}: ${device.label || '未知设备'} (ID: ${device.deviceId.substring(0, 8)}...)`);
                    });
                }
            } catch (e) {
                writeLog(`❌ 枚举设备失败: ${e.message}`, 'error');
            }
            
            writeLog('<h3>4️⃣ 摄像头访问测试</h3>');
            writeLog('⏳ 正在尝试访问摄像头...');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                writeLog('✅ 成功获取摄像头视频流！', 'success');
                
                const tracks = stream.getVideoTracks();
                writeLog(`<p>📹 视频轨道信息:</p>`);
                tracks.forEach(track => {
                    const settings = track.getSettings();
                    writeLog(`   - 分辨率: ${settings.width}x${settings.height}`);
                    writeLog(`   - 帧率: ${settings.frameRate || '未知'} fps`);
                    writeLog(`   -  facingMode: ${settings.facingMode || '未知'}`);
                });
                
                const video = document.createElement('video');
                video.autoplay = true;
                video.muted = true;
                video.srcObject = stream;
                video.style.width = '100%';
                video.style.marginTop = '10px';
                video.style.border = '2px solid green';
                video.style.borderRadius = '8px';
                debugWindow.document.body.appendChild(video);
                
                writeLog('<p style="color: green; margin-top: 10px;">✅ 摄像头工作正常！如果上方能看到视频画面，说明硬件和权限都没问题。</p>', 'success');
                
                setTimeout(() => {
                    stream.getTracks().forEach(track => track.stop());
                    writeLog('<p>🛑 视频流已停止（测试完成）</p>');
                }, 5000);
                
            } catch (err) {
                writeLog(`❌ 摄像头访问失败`, 'error');
                writeLog(`<p><strong>错误名称:</strong> ${err.name}</p>`, 'error');
                writeLog(`<p><strong>错误消息:</strong> ${err.message}</p>`, 'error');
                
                writeLog('<h4>🔍 错误原因分析：</h4>');
                if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                    writeLog('📌 权限被拒绝', 'error');
                    writeLog('💡 解决方法：点击地址栏左侧的 🔒 锁图标 → 找到"摄像头" → 从下拉菜单选择"允许" → 刷新页面');
                } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                    writeLog('📌 找不到摄像头设备', 'error');
                    writeLog('💡 解决方法：1.检查摄像头是否被其他程序占用 2.在 Windows 设置→隐私→相机中启用摄像头 3.更新摄像头驱动');
                } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                    writeLog('📌 摄像头被占用或无法读取', 'error');
                    writeLog('💡 解决方法：关闭所有可能使用摄像头的程序（Zoom、Teams、微信、QQ等），然后刷新页面');
                } else if (err.name === 'OverconstrainedError') {
                    writeLog('📌 请求的视频参数不被支持', 'error');
                    writeLog('💡 解决方法：降低分辨率要求或移除高级约束条件');
                } else if (err.name === 'SecurityError') {
                    writeLog('📌 安全限制', 'error');
                    writeLog('💡 解决方法：必须通过 http://localhost 或 https:// 访问，不能使用 file:// 协议');
                } else {
                    writeLog(`📌 未知错误类型: ${err.name}`);
                    writeLog('💡 建议：查看浏览器控制台（F12）获取更多信息');
                }
            }
            
            writeLog('<hr/>');
            writeLog('<p style="font-size: 12px; color: gray;">诊断完成。如果仍有问题，请将此报告截图发给技术支持。</p>');
            debugWindow.document.close();
        });

        const summonBtn = document.getElementById('summon-magic');
        const magicInfoBox = document.getElementById('ai-magic-info');
        const magicNameText = document.getElementById('magic-name-text');
        const magicLoreText = document.getElementById('magic-lore');

        summonBtn.addEventListener('click', () => {
            const magic = randomMagic();
            currentMagic.normalH = magic.normalH;
            currentMagic.pinchH = magic.pinchH;
            magicNameText.textContent = magic.themeName;
            magicLoreText.textContent = magic.lore;
            magicInfoBox.classList.remove('hidden');
            particles = [];
        });

        // --- 手部骨骼连接定义 (MediaPipe 标准 21 个关键点) ---
        const HAND_CONNECTIONS = [
            [0,1],[1,2],[2,3],[3,4], // 拇指
            [0,5],[5,6],[6,7],[7,8], // 食指
            [0,9],[9,10],[10,11],[11,12], // 中指
            [0,13],[13,14],[14,15],[15,16], // 无名指
            [0,17],[17,18],[18,19],[19,20], // 小指
            [5,9],[9,13],[13,17] // 手掌内部
        ];

        // --- 绘制骨骼和关键点（自定义）---
        function drawSkeleton(ctx, landmarks, isPinching, canvasWidth, canvasHeight) {
            // 绘制连接线
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#ffffff40';
            for (let conn of HAND_CONNECTIONS) {
                const start = landmarks[conn[0]];
                const end = landmarks[conn[1]];
                if (start && end) {
                    const sx = start.x * canvasWidth;
                    const sy = start.y * canvasHeight;
                    const ex = end.x * canvasWidth;
                    const ey = end.y * canvasHeight;
                    ctx.beginPath();
                    ctx.moveTo(sx, sy);
                    ctx.lineTo(ex, ey);
                    ctx.stroke();
                }
            }
            // 绘制关键点
            for (let i = 0; i < landmarks.length; i++) {
                const pt = landmarks[i];
                const x = pt.x * canvasWidth;
                const y = pt.y * canvasHeight;
                ctx.beginPath();
                ctx.fillStyle = isPinching ? '#ef4444' : '#06b6d4';
                ctx.arc(x, y, 3, 0, 2 * Math.PI);
                ctx.fill();
            }
        }

        let handData = null;

        // --- 动画循环 ---
        function animate() {
            // 拖尾效果
            canvasCtx.globalAlpha = 0.15;
            canvasCtx.fillStyle = '#0f172a';
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalAlpha = 1.0;

            // 绘制摄像头预览画面（在右上角）
            if (showVideo && videoElement && videoElement.readyState >= 2) {
                const previewWidth = 192;
                const previewHeight = 144;
                const padding = 24;
                const x = canvasElement.width - previewWidth - padding;
                const y = padding;
                
                // 镜像绘制视频（水平翻转）
                canvasCtx.save();
                canvasCtx.translate(x + previewWidth, y);
                canvasCtx.scale(-1, 1);
                canvasCtx.drawImage(videoElement, 0, 0, previewWidth, previewHeight);
                canvasCtx.restore();
                
                // 绘制边框
                canvasCtx.strokeStyle = '#475569';
                canvasCtx.lineWidth = 2;
                canvasCtx.strokeRect(x, y, previewWidth, previewHeight);
            }

            // 更新粒子
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                p.draw(canvasCtx);
                if (p.life <= 0) particles.splice(i,1);
            }

            // 手势交互
            if (handData && handData.multiHandLandmarks) {
                const landmarks = handData.multiHandLandmarks;
                for (let i = 0; i < landmarks.length; i++) {
                    const lm = landmarks[i];
                    const indexTip = lm[8];
                    const thumbTip = lm[4];
                    
                    const ix = (1 - indexTip.x) * canvasElement.width;
                    const iy = indexTip.y * canvasElement.height;
                    
                    const dx = indexTip.x - thumbTip.x;
                    const dy = indexTip.y - thumbTip.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    const isPinching = distance < 0.05;
                    
                    const particleCount = isPinching ? 10 : 2;
                    for (let j = 0; j < particleCount; j++) {
                        particles.push(new Particle(ix, iy, isPinching));
                    }
                    
                    // 绘制骨骼（如果开启）
                    if (showSkeleton) {
                        canvasCtx.save();
                        // 镜像翻转坐标系（因为摄像头是镜像的）
                        canvasCtx.scale(-1, 1);
                        canvasCtx.translate(-canvasElement.width, 0);
                        drawSkeleton(canvasCtx, lm, isPinching, canvasElement.width, canvasElement.height);
                        canvasCtx.restore();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // --- MediaPipe 初始化 ---
        function initMediaPipe() {
            if (typeof Hands === 'undefined') {
                setTimeout(initMediaPipe, 200);
                return;
            }
            const hands = new Hands({ locateFile: (file) => `./mediapipe/${file}` });
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            hands.onResults((results) => {
                if (!isModelLoaded) {
                    isModelLoaded = true;
                    statusIndicator.className = 'w-3 h-3 rounded-full bg-green-500';
                    statusText.textContent = '模型就绪，请伸出手';
                }
                handData = results;
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    console.log('🖐️ 检测到手部，数量:', results.multiHandLandmarks.length);
                }
            });

            async function startCam() {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('您的浏览器不支持摄像头访问功能。请使用 Chrome、Edge、Firefox 或 Safari 的最新版本。');
                    }
                    
                    console.log('📸 正在请求摄像头权限...');
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { 
                            width: { ideal: 640 },
                            height: { ideal: 480 },
                            facingMode: 'user'
                        } 
                    });
                    
                    console.log('✅ 摄像头权限已授予');
                    console.log('📊 视频流轨道数:', stream.getVideoTracks().length);
                    console.log('📹 视频轨道信息:', stream.getVideoTracks()[0].getSettings());
                    
                    videoElement.srcObject = stream;
                    console.log('📹 视频流已绑定到 video 元素');
                    
                    // 等待视频元数据加载
                    await new Promise((resolve, reject) => {
                        videoElement.onloadedmetadata = () => {
                            console.log('📏 视频元数据已加载，尺寸:', videoElement.videoWidth, 'x', videoElement.videoHeight);
                            resolve();
                        };
                        videoElement.onerror = (e) => reject(new Error('视频元素加载失败'));
                        setTimeout(() => reject(new Error('视频元数据加载超时')), 5000);
                    });
                    
                    // 播放视频
                    await videoElement.play();
                    console.log('✅ 视频播放已启动，等待 MediaPipe 处理...');
                    
                    // 确保视频元素可见（不要 display:none），以保证 drawImage 能获取帧数据
                    // 样式已在 CSS 中设置为 opacity:0 + 绝对定位，无需额外操作
                    
                    // 启动 MediaPipe 循环
                    function sendFrame() {
                        if (videoElement.readyState >= 2) {
                            hands.send({ image: videoElement }).catch(e => console.warn('sendFrame error:', e));
                        }
                        requestAnimationFrame(sendFrame);
                    }
                    sendFrame();
                    
                } catch (err) {
                    console.error("❌ 摄像头错误:", err);
                    let errorMessage = '无法访问摄像头。';
                    
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        errorMessage = '摄像头权限被拒绝。请点击浏览器地址栏左侧的 🔒 图标，将摄像头权限改为"允许"，然后刷新页面。';
                    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        errorMessage = '未找到摄像头设备。请确认摄像头已正确连接，并在系统设置中启用摄像头。';
                    } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                        errorMessage = '摄像头被其他应用占用。请关闭 Zoom、Teams、微信等可能使用摄像头的程序，然后刷新页面。';
                    } else if (err.name === 'OverconstrainedError') {
                        errorMessage = '摄像头不支持请求的分辨率。尝试降低分辨率设置。';
                    } else if (err.message.includes('secure context') || window.location.protocol === 'file:') {
                        errorMessage = '安全限制：请通过 http://localhost:8080 访问，不要直接双击打开 HTML 文件（file:// 协议）。运行命令：npm run dev';
                    }
                    
                    errorScreen.querySelector('h2').textContent = '摄像头访问失败';
                    errorScreen.querySelector('p').innerHTML = `
                        <div class="text-left space-y-2">
                            <p class="text-red-400 font-mono text-sm">${err.name}: ${err.message}</p>
                            <hr class="border-slate-700 my-3"/>
                            <p>${errorMessage}</p>
                            <hr class="border-slate-700 my-3"/>
                            <p class="text-xs text-slate-500">
                                💡 提示：打开浏览器开发者工具（F12）→ Console 标签查看更多调试信息
                            </p>
                        </div>
                    `;
                    errorScreen.classList.remove('hidden');
                }
            }
            startCam();
        }

        initMediaPipe();
    </script>
</body>
</html>
